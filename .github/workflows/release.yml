name: Release

# Cuts a GitHub Release with attested artifacts on every `v*` tag.
#
# The four package-registry publish jobs (PyPI, NuGet, Maven Central,
# crates.io) are gated behind the repository variable PUBLISH_PACKAGES.
# They stay skipped until the maintainer flips the switch:
#   gh variable set PUBLISH_PACKAGES --repo vulnmaster/CASE-UCO-SDK --body true
# Each registry also requires its credentials/secrets to be configured
# (NUGET_API_KEY, MAVEN_*/GPG_*, CARGO_REGISTRY_TOKEN, and a PyPI
# Trusted Publisher binding for this repo + workflow).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

jobs:
  generate:
    name: Generate Libraries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install generator dependencies
        run: pip install rdflib jinja2

      - name: Run code generator
        run: PYTHONPATH=generator/src python -m case_uco_generator generate --lang all

      - name: Upload generated sources
        uses: actions/upload-artifact@v7
        with:
          name: generated-sources
          path: |
            python/case_uco/
            csharp/CaseUco/
            csharp/CaseUco.Tests/ExhaustiveInstantiationTests.cs
            java/src/
            rust/src/
            rust/tests/

  build-python:
    name: Build Python
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        working-directory: python
        run: python -m build

      - name: Generate SBOM
        run: |
          pip install pip-audit
          pip install -e python/
          pip-audit --format=cyclonedx-json --output=python/dist/sbom-python.cdx.json 2>/dev/null || true
          pip freeze > python/dist/requirements-frozen.txt

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-python
          path: python/dist/

  build-csharp:
    name: Build C#
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Build NuGet package
        working-directory: csharp
        run: |
          dotnet build -c Release
          dotnet pack CaseUco/CaseUco.csproj -c Release -o dist/

      - name: Upload C# artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-csharp
          path: csharp/dist/

  build-java:
    name: Build Java
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Build JAR
        working-directory: java
        run: mvn package -q -DskipTests

      - name: Upload Java artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-java
          path: java/target/*.jar

  build-rust:
    name: Build Rust
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Build crate
        working-directory: rust
        run: cargo package --allow-dirty

      - name: Upload Rust artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-rust
          path: rust/target/package/*.crate

  release:
    name: Create Release
    needs: [build-python, build-csharp, build-java, build-rust]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp artifacts/dist-python/*.whl release-assets/ 2>/dev/null || true
          cp artifacts/dist-python/*.tar.gz release-assets/ 2>/dev/null || true
          cp artifacts/dist-python/sbom-python.cdx.json release-assets/ 2>/dev/null || true
          cp artifacts/dist-python/requirements-frozen.txt release-assets/ 2>/dev/null || true
          cp artifacts/dist-csharp/*.nupkg release-assets/ 2>/dev/null || true
          cp artifacts/dist-java/*.jar release-assets/ 2>/dev/null || true
          cp artifacts/dist-rust/*.crate release-assets/ 2>/dev/null || true

      - name: Generate SHA256 checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release-assets/*

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section starting at "## [VERSION]" up to the next "## [" header.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; print; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-body.md

          if [ ! -s release-body.md ]; then
            echo "WARN: no CHANGELOG section found for [$VERSION]; falling back to a placeholder."
            printf '## CASE/UCO SDK %s\n\nSee [CHANGELOG.md](https://github.com/%s/blob/main/CHANGELOG.md) for details.\n' \
              "${GITHUB_REF_NAME}" "${GITHUB_REPOSITORY}" > release-body.md
          fi

          # Append the verification + checksum footer (kept in a separate file
          # so the heredoc inside this run script does not collide with YAML
          # parsing of column-0 markers like --- or ***).
          cat .github/release-footer.md >> release-body.md
          echo "wrote $(wc -l < release-body.md) lines to release-body.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: false
          files: release-assets/*
          body_path: release-body.md

  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: vars.PUBLISH_PACKAGES == 'true'
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      id-token: write
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-python
          path: dist/

      - name: Remove non-package files
        run: |
          rm -f dist/sbom-python.cdx.json dist/requirements-frozen.txt

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-nuget:
    name: Publish to NuGet
    needs: release
    if: vars.PUBLISH_PACKAGES == 'true'
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Download C# artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-csharp
          path: dist/

      - name: Push to NuGet
        run: dotnet nuget push dist/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}

  publish-maven:
    name: Publish to Maven Central
    needs: release
    if: vars.PUBLISH_PACKAGES == 'true'
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Deploy to Maven Central
        working-directory: java
        run: mvn deploy -P release -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  publish-crates:
    name: Publish to crates.io
    needs: release
    if: vars.PUBLISH_PACKAGES == 'true'
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Publish to crates.io
        working-directory: rust
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
